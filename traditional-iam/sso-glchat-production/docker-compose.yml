services:
  postgres:
    image: postgres:15
    container_name: sso-glchat-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gliam
    ports:
      # Host 55432 → container 5432. Uses a high ephemeral port so this cookbook
      # doesn't collide with other postgres containers running on the host.
      - "55432:5432"
    volumes:
      - sso_glchat_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sso-glchat-redis
    ports:
      # Host 56379 → container 6379, for the same reason.
      - "56379:6379"

volumes:
  sso_glchat_pg:
