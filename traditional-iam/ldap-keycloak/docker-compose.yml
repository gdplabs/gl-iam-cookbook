services:
  # OpenLDAP — simulates a corporate directory
  openldap:
    image: osixia/openldap:1.5.0
    container_name: ldap-keycloak-openldap
    environment:
      LDAP_ORGANISATION: "Example Corp"
      LDAP_DOMAIN: "example.org"
      LDAP_ADMIN_PASSWORD: "adminpassword"
    ports:
      - "389:389"
    volumes:
      - ./ldap-seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/seed.ldif
    command: --copy-service
    networks:
      - ldap-network

  # Keycloak database
  keycloak-db:
    image: postgres:16-alpine
    container_name: ldap-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - ldap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Keycloak — bridges LDAP and your application
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ldap-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
      - "9000:9000"   # Keycloak management port (health/metrics). Change host side if 9000 is taken, e.g. "9100:9000".
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - ldap-network
    depends_on:
      keycloak-db:
        condition: service_healthy
      openldap:
        condition: service_started

networks:
  ldap-network:
    driver: bridge

volumes:
  keycloak_db_data:
